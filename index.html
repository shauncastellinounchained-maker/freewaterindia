<section>
  <h2>Advertise on Water Bottles</h2>
  <p>Upload your ad and see how it appears on our bottle.</p>

  <input type="file" id="upload" accept="image/*"><br><br>

  <p>Recommended Ad Size: <b>500 x 300 px</b></p>
  <p id="info"></p>

  <div style="position:relative; width:200px; margin-top:20px;">
    
    <!-- Bottle Image -->
    <img src="https://i.imgur.com/2DhmtJ4.png" style="width:100%;">

    <!-- Ad overlay -->
    <img id="adPreview" style="
      position:absolute;
      top:35%;
      left:15%;
      width:70%;
      height:auto;
      opacity:0.9;
      display:none;
      border-radius:5px;
    ">
  </div>

  <br>
  <p id="sizeDisplay"></p>
</section>

<script>
document.getElementById("upload").addEventListener("change", function(event) {
  const file = event.target.files[0];
  if (!file) return;

  const img = new Image();
  img.onload = function() {

    // Show dimensions
    document.getElementById("info").innerText =
      "Uploaded Image Size: " + img.width + " x " + img.height + " px";

    // Calculate area usage (approx)
    const maxArea = 500 * 300;
    const imgArea = img.width * img.height;
    const percent = Math.min((imgArea / maxArea) * 100, 100).toFixed(1);

    document.getElementById("sizeDisplay").innerText =
      "Ad occupies approx " + percent + "% of recommended space";

  };

  const url = URL.createObjectURL(file);
  img.src = url;

  // Show on bottle
  const preview = document.getElementById("adPreview");
  preview.src = url;
  preview.style.display = "block";
});
</script>
