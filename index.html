<!DOCTYPE html>
<html>
<head>
<title>Free Water Initiative</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(180deg, #eef7ff, #ffffff);
  color: #111;
}

/* HERO */
.hero {
  text-align: center;
  padding: 90px 20px 50px;
}

.hero h1 {
  font-size: 48px;
}

.hero p {
  color: #555;
}

/* SECTION */
.section {
  max-width: 1100px;
  margin: auto;
  padding: 60px 20px;
  text-align: center;
}

/* CARD */
.card {
  background: white;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.08);
}

/* INPUTS */
input, select {
  padding: 10px;
  margin: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

/* RESULT BOX */
.result {
  margin-top: 20px;
  font-weight: bold;
  color: #0077b6;
}

/* BOTTLE */
.cap {
  width: 90px;
  height: 40px;
  background: linear-gradient(45deg, #0077b6, #00b4d8);
  margin: 20px auto 0;
  border-radius: 12px 12px 0 0;
}

.bottle {
  width: 240px;
  height: 450px;
  background: white;
  border-radius: 30px;
  margin: 0 auto;
  position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.1);
}

.title {
  position: absolute;
  top: 18px;
  width: 100%;
  font-weight: bold;
  color: #0077b6;
}

/* SLOTS */
.ad-slot {
  width: 170px;
  height: 90px;
  border: 2px dashed #ddd;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 12px;
  background: #fafafa;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: #888;
  cursor: pointer;
}

.ad-slot:hover {
  border-color: #00b4d8;
}

.selected {
  border-color: #0077b6;
  background: #e6f7ff;
}

#slot1 { top: 100px; }
#slot2 { top: 230px; }
#slot3 { top: 360px; }

.ad-slot img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 40px;
  color: #777;
}
</style>

</head>

<body>

<div class="hero">
  <h1>Free Water for Everyone</h1>
  <p>Funded by smart advertising campaigns</p>
</div>

<div class="section">
  <h2>How It Works</h2>
  <p>Brands sponsor public hydration by running ad campaigns on distributed water bottles.</p>
</div>

<div class="section">
  <h2>Build Your Campaign</h2>

  <div class="card">

    <input type="date" id="start">
    <input type="date" id="end"><br>

    <select id="location">
      <option>Railway Station</option>
      <option>College</option>
      <option>Public Street</option>
    </select><br>

    <input type="number" id="bottles" placeholder="Bottles per day"><br>

    <button onclick="calculate()">Calculate Campaign</button>

    <div class="result" id="output"></div>

  </div>
</div>

<div class="section">
  <h2>Ad Placement Demo</h2>

  <input type="file" id="upload"><br>

  <div class="cap"></div>

  <div class="bottle">
    <div class="title">FREE WATER</div>

    <div class="ad-slot" id="slot1">Ad Slot</div>
    <div class="ad-slot" id="slot2">Ad Slot</div>
    <div class="ad-slot" id="slot3">Ad Slot</div>
  </div>
</div>

<div class="footer">
  Design Thinking Project | Free Water Initiative
</div>

<script>
let selectedSlot = null;
const pricePerBottle = 2;

document.querySelectorAll(".ad-slot").forEach(slot => {
  slot.addEventListener("click", () => {
    document.querySelectorAll(".ad-slot").forEach(s => s.classList.remove("selected"));
    slot.classList.add("selected");
    selectedSlot = slot;
  });
});

document.getElementById("upload").addEventListener("change", function(e) {
  if (!selectedSlot) {
    alert("Select a slot first");
    return;
  }

  const file = e.target.files[0];
  if (!file) return;

  selectedSlot.innerHTML = "";
  const img = document.createElement("img");
  img.src = URL.createObjectURL(file);
  selectedSlot.appendChild(img);
});

function calculate() {
  const start = new Date(document.getElementById("start").value);
  const end = new Date(document.getElementById("end").value);
  const bottles = document.getElementById("bottles").value;

  if (!start || !end || !bottles) return;

  const days = (end - start) / (1000 * 60 * 60 * 24) + 1;
  const totalBottles = days * bottles;
  const cost = totalBottles * pricePerBottle;

  document.getElementById("output").innerHTML =
    "Total Bottles: " + totalBottles +
    "<br>Total Cost: ₹" + cost;
}
</script>

</body>
</html>
