<!DOCTYPE html>
<html>
<head>
<title>Free Water Bottle Ad System</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

.bottle {
  width: 200px;
  height: 400px;
  background: white;
  border: 3px solid #0077b6;
  border-radius: 20px;
  margin: 30px auto;
  position: relative;
}

.cap {
  width: 80px;
  height: 40px;
  background: #0077b6;
  margin: auto;
  border-radius: 10px 10px 0 0;
}

.title {
  position: absolute;
  top: 10px;
  width: 100%;
  font-weight: bold;
  color: #0077b6;
}

.ad-slot {
  width: 140px;
  height: 80px;
  border: 2px dashed #aaa;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  overflow: hidden;
}

#slot1 { top: 80px; }
#slot2 { top: 180px; }
#slot3 { top: 280px; }

.ad-slot img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

</style>
</head>

<body>

<h1>Free Water Bottle Advertising</h1>

<input type="file" id="upload" accept="image/*">

<div class="cap"></div>

<div class="bottle">
  <div class="title">FREE WATER</div>

  <div class="ad-slot" id="slot1"></div>
  <div class="ad-slot" id="slot2"></div>
  <div class="ad-slot" id="slot3"></div>
</div>

<script>
let currentSlot = 1;

document.getElementById("upload").addEventListener("change", function(event) {
  const file = event.target.files[0];
  if (!file) return;

  const img = document.createElement("img");
  img.src = URL.createObjectURL(file);

  const slot = document.getElementById("slot" + currentSlot);
  slot.innerHTML = "";
  slot.appendChild(img);

  currentSlot++;
  if (currentSlot > 3) currentSlot = 1;
});
</script>

</body>
</html>
