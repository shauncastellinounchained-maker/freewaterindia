<!DOCTYPE html>
<html>
<head>
<title>Free Water Bottle Advertising</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f7fa;
}

h1 {
  margin-top: 20px;
}

input {
  margin: 15px;
}

.cap {
  width: 90px;
  height: 40px;
  background: #0077b6;
  margin: 20px auto 0;
  border-radius: 12px 12px 0 0;
}

.bottle {
  width: 220px;
  height: 420px;
  background: white;
  border: 3px solid #0077b6;
  border-radius: 25px;
  margin: 0 auto 30px;
  position: relative;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.title {
  position: absolute;
  top: 15px;
  width: 100%;
  font-weight: bold;
  color: #0077b6;
  font-size: 18px;
}

.ad-slot {
  width: 150px;
  height: 80px;
  border: 2px dashed #bbb;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  background: #fafafa;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: #888;
  overflow: hidden;
}

#slot1 { top: 80px; }
#slot2 { top: 190px; }
#slot3 { top: 300px; }

.ad-slot img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>

</head>

<body>

<h1>Free Water Bottle Advertising</h1>

<p>Upload ads to place them on bottle slots</p>

<input type="file" id="upload" accept="image/*">

<div class="cap"></div>

<div class="bottle">
  <div class="title">FREE WATER</div>

  <div class="ad-slot" id="slot1">Ad Space 1</div>
  <div class="ad-slot" id="slot2">Ad Space 2</div>
  <div class="ad-slot" id="slot3">Ad Space 3</div>
</div>

<script>
let currentSlot = 1;

document.getElementById("upload").addEventListener("change", function(event) {
  const file = event.target.files[0];
  if (!file) return;

  const slot = document.getElementById("slot" + currentSlot);
  slot.innerHTML = "";

  const img = document.createElement("img");
  img.src = URL.createObjectURL(file);

  slot.appendChild(img);

  currentSlot++;
  if (currentSlot > 3) currentSlot = 1;
});
</script>

</body>
</html>
